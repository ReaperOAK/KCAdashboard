name: Generate a build and push to another branch

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    steps:
      - name: git-checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for proper branch handling
          ref: main       # Explicitly checkout main branch

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16' # Specify your Node.js version here

      - name: Install dependencies
        run: |
          # Create temporary build directory to isolate the node_modules
          mkdir -p temp-build
          cd temp-build
          
          # Copy source files excluding node_modules
          cp -r ../src ../public ../package.json ../package-lock.json ./
          
          # Copy fixed packages to use in installation
          mkdir -p fixed-packages
          cp -r ../fixed-packages ./
          
          # Create .npmrc to handle problematic packages
          echo "lichess-pgn-viewer@*:*: --no-save" > .npmrc
          echo "snabbdom@*:*: --no-save" >> .npmrc
          
          # Install dependencies
          npm install
          
          # Copy fixed packages after installation
          mkdir -p node_modules/lichess-pgn-viewer
          mkdir -p node_modules/snabbdom
          cp -r fixed-packages/lichess-pgn-viewer/* node_modules/lichess-pgn-viewer/
          cp -r fixed-packages/snabbdom/* node_modules/snabbdom/

      - name: Build React app
        run: |
          cd temp-build
          npm run build
          cp -r build ../build

      - name: Copy API files
        run: |
          mkdir -p build/api
          cp -r api/* build/api/
          cp .htaccess build/

      - name: Clean workspace before pushing
        run: |
          # Remove unnecessary files before pushing
          rm -rf node_modules
          rm -rf temp-build

      - name: Configure Git and Authentication
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Set up authentication with PAT_TOKEN
          git remote set-url origin https://${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          
      - name: Create fresh build branch
        run: |
          # Create a fresh build branch with single commit history
          git checkout --orphan temp-build
          git rm -rf .
          cp -r build/* .
          cp build/.* . 2>/dev/null || true
          git add .
          git commit -m "Build from: ${{ github.sha }} - ${{ github.event.head_commit.message }}"
          
          # Force push to build branch to ensure it has linear history
          git branch -D build 2>/dev/null || true
          git branch -m build
          git push -f origin build